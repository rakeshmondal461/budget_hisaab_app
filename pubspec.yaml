name: hisaab
description: "A comprehensive personal companion for tracking expenses, tasks, and budgets."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^13.2.0
  path_provider: ^2.1.3
  intl: ^0.19.0
  fl_chart: ^0.66.0
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0
  permission_handler: ^11.3.1
  flutter_sms_inbox: ^1.0.1
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  http: ^1.2.1
  uuid: ^4.5.3
  share_plus: ^12.0.2
  syncfusion_flutter_xlsio: ^33.2.10
  google_fonts: ^8.1.0
  file_picker: ^8.0.0
  csv: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
